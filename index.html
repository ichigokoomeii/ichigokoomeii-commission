    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cherry-bg': '#FFF5F5',      /* 蕾絲櫻粉底色 */

    <style>
        /* 花朵旋轉動畫 */
        @keyframes flower-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-flower { animation: flower-spin 4s infinite linear; }
        
        /* 網頁背景：清爽、不密集的純白大圓點矩陣 */
        body {
            background-color: #FFF5F5; 
            background-image: radial-gradient(#FFFFFF 4px, transparent 4px); 
            background-size: 40px 40px; 
            background-position: 0 0;   
            font-family: 'cwTeXYen', 'Microsoft JhengHei', sans-serif;
            color: #7A4F55;

        }

        /* 提示文字呼吸燈動畫 */
        @keyframes hint-pulse {
            0%, 100% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-2px); }
        }
        .animate-hint { animation: hint-pulse 2.5s infinite ease-in-out; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 票根圓弧波浪狀卡片樣式 */
        .ticket-card { 
            position: relative;
            box-shadow: 0px 16px 32px rgba(243, 209, 214, 0.5);
            border-left: 3px solid #F3D1D6;
            border-right: 3px solid #F3D1D6;
            padding-top: 1rem;
            padding-bottom: 1rem;
            min-height: 400px;
        }
        @media (min-width: 768px) {
            .ticket-card {
                min-height: 600px; /* 大幅撐高大卡片容納超大圖 */
            }
        }

        /* 頂部與底部的純 CSS 圓弧波浪鋸齒效果 */
        .ticket-card::before, .ticket-card::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            width: 100%; 
            height: 24px;
            background-size: 24px 24px;
            background-repeat: repeat-x;
            z-index: 50; 
        }

        /* 頂部向內凹的大半圓弧線 */
        .ticket-card::before {
            top: -12px;
            background-image: 
                radial-gradient(circle at 12px 0px, #FFF5F5 8px, transparent 8.5px),
                radial-gradient(circle at 12px 0px, transparent 8px, #F3D1D6 8.5px, #F3D1D6 11px, #FFFFFF 11.5px),
                linear-gradient(to right, #F3D1D6 3px, transparent 3px),
                linear-gradient(to left, #F3D1D6 3px, transparent 3px);
        }

        /* 底部向內凹的大半圓弧線 */
        .ticket-card::after {
            bottom: -12px;
            background-image: 
                radial-gradient(circle at 12px 24px, #FFF5F5 8px, transparent 8.5px),
                radial-gradient(circle at 12px 24px, transparent 8px, #F3D1D6 8.5px, #F3D1D6 11px, #FFFFFF 11.5px),
                linear-gradient(to right, #F3D1D6 3px, transparent 3px),
                linear-gradient(to left, #F3D1D6 3px, transparent 3px);
        }

        /* 首頁底圖響應式調整 */
        .ticket-home-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.plurk.com/6bgBRsysBN7b9sUuRDzLOX.jpg');
            background-repeat: no-repeat;
            opacity: 0.35;
            z-index: 1;
            border-radius: 4px;
            background-size: cover;          
            background-position: 140px 30%; 
        }

        @media (min-width: 768px) {
            .ticket-home-bg {
                background-size: 115%;           
                background-position: 140px 25%;  
            }
        }

        .ticket-content {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
        }

        /* 輪播圖轉場 */
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 100%;
            touch-action: pan-y pinch-zoom;
            will-change: transform;
            cursor: grab; 
        }
        .carousel-track:active {
            cursor: grabbing; 
        }
        .carousel-slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
        }
        .carousel-slide img {
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: auto;
            cursor: pointer;
        }

        /* 讓 Panzoom 縮放容器完美置中與設定鼠標 */
        #panzoomWrapper {
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out;
        }
    </style>

    <script>
        // --- 右下角浮動選單邏輯 ---
        const menuBtn = document.getElementById('strawberryMenuBtn');
        const snsContainer = document.getElementById('snsLinkContainer');
        let isMenuOpen = false;

        menuBtn.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                snsContainer.classList.remove('opacity-0', 'scale-75', 'translate-y-4', 'pointer-events-none');
                snsContainer.classList.add('opacity-100', 'scale-100', 'translate-y-0');
            } else {
                snsContainer.classList.add('opacity-0', 'scale-75', 'translate-y-4', 'pointer-events-none');
                snsContainer.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
            }
        });

        // --- 分頁切換邏輯 ---
        const pageHome = document.getElementById('page-home');
        const pagePrices = document.getElementById('page-prices');
        const homeBgLayer = document.getElementById('home-bg-layer');
        const btnNavHome = document.getElementById('nav-home');
        const btnNavPrices = document.getElementById('nav-prices');

        function updateNavStyles(activeBtn) {
            [btnNavHome, btnNavPrices].forEach(btn => {
                btn.classList.remove('bg-cherry-accent', 'text-white', 'hover:bg-cherry-accent-dark', 'border-transparent');
                btn.classList.add('bg-white', 'text-cherry-text', 'border-cherry-border', 'hover:border-cherry-accent');
            });
            activeBtn.classList.remove('bg-white', 'text-cherry-text', 'border-cherry-border', 'hover:border-cherry-accent');
            activeBtn.classList.add('bg-cherry-accent', 'text-white', 'hover:bg-cherry-accent-dark', 'border-transparent');
        }

        btnNavHome.addEventListener('click', () => {
            pagePrices.classList.add('hidden');
            pagePrices.classList.remove('flex');
            pageHome.classList.remove('hidden');
            pageHome.classList.add('flex');
            homeBgLayer.style.display = 'block';
            updateNavStyles(btnNavHome);
            stopCarousel();
        });

        btnNavPrices.addEventListener('click', () => {
            pageHome.classList.add('hidden');
            pageHome.classList.remove('flex');
            pagePrices.classList.remove('hidden');
            pagePrices.classList.add('flex');
            homeBgLayer.style.display = 'none';
            updateNavStyles(btnNavPrices);
            currentSlide = 0;
            moveSlide(0);
            startCarousel();
        });

        // --- 價目表輪播跑馬燈邏輯 ---
        const track = document.getElementById('carouselTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dots = document.querySelectorAll('#carouselDots span');
        const totalSlides = 8;
        let currentSlide = 0;
        let carouselInterval = null;
        const slideDuration = 5000;

        function moveSlide(index) {
            if (index >= totalSlides) currentSlide = 0;
            else if (index < 0) currentSlide = totalSlides - 1;
            else currentSlide = index;

            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            dots.forEach((dot, idx) => {
                if (idx === currentSlide) {
                    dot.classList.remove('bg-cherry-border');
                    dot.classList.add('bg-cherry-accent', 'scale-125');
                } else {
                    dot.classList.remove('bg-cherry-accent', 'scale-125');
                    dot.classList.add('bg-cherry-border');
                }
            });
        }

        function startCarousel() {
            stopCarousel();
            carouselInterval = setInterval(() => {
                moveSlide(currentSlide + 1);
            }, slideDuration);
        }

        function stopCarousel() {
            if (carouselInterval) {
                clearInterval(carouselInterval);
            }
        }

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            moveSlide(currentSlide + 1);
            startCarousel();
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            moveSlide(currentSlide - 1);
            startCarousel();
        });

        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                const idx = parseInt(dot.getAttribute('data-index'));
                moveSlide(idx);
                startCarousel();
            });
        });

        // --- 滑動與手機板滑動功能 ---
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let startTime = 0; 

        const getClientX = (e) => e.touches ? e.touches[0].clientX : e.clientX;
        const getClientY = (e) => e.touches ? e.touches[0].clientY : e.clientY;

        function handleDragStart(e) {
            if (e.touches && e.touches.length > 1) return;
            isDragging = true;
            startX = getClientX(e);
            startY = getClientY(e);
            startTime = Date.now(); 
            stopCarousel(); 
        }

        function handleDragEnd(e) {
            if (!isDragging) return;
            isDragging = false;

            const endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            const swipeThreshold = 50; 
            const diffX = startX - endX;
            const diffY = startY - endY;
            const duration = Date.now() - startTime;

            if (Math.abs(diffX) < 10 && Math.abs(diffY) < 10 && duration < 250) {
                const currentImg = track.children[currentSlide].querySelector('img');
                if (currentImg) {
                    openLightbox(currentImg.src);
                }
                startCarousel();
                return;
            }

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > swipeThreshold) {
                    if (diffX > 0) moveSlide(currentSlide + 1);
                    else moveSlide(currentSlide - 1);
                }
            }
            startCarousel(); 
        }

        track.addEventListener('touchstart', handleDragStart, { passive: true });
        track.addEventListener('touchend', handleDragEnd, { passive: true });
        track.addEventListener('mousedown', handleDragStart);
        track.addEventListener('mouseup', handleDragEnd);
        track.addEventListener('mouseleave', handleDragEnd);


        // ===================================================
        // 核心修正：進階全螢幕燈箱（完美解決對齊與過大跑位問題）
        // ===================================================
        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomRatioTag = document.getElementById('zoomRatioTag');
        const panzoomContainer = document.getElementById('panzoomContainer');
        const panzoomWrapper = document.getElementById('panzoomWrapper');
        
        let pzInstance = null;

        function initPanzoom() {
            if (pzInstance) pzInstance.destroy();

            // 改為綁定在外層的 Wrapper 上，使內部的圖片樣式不會被套件干擾導致拉伸
            pzInstance = Panzoom(panzoomWrapper, {
                maxScale: 4,        
                minScale: 1,        
                contain: 'outside', 
                cursor: 'move'      
            });

            // 監聽滑鼠滾輪縮放
            panzoomContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                pzInstance.zoomWithWheel(e);
            }, { passive: false });

            // 同步比例小標籤
            panzoomWrapper.addEventListener('panzoomchange', (e) => {
                const currentScale = e.detail.scale.toFixed(1);
                zoomRatioTag.textContent = `${currentScale}x`;
                
                if (parseFloat(currentScale) > 1.0) {
                    zoomRatioTag.style.opacity = '1';
                } else {
                    zoomRatioTag.style.opacity = '0';
                }
            });
        }

        function openLightbox(imgSrc) {
            stopCarousel(); 
            lightboxImg.src = imgSrc;
            
            lightboxOverlay.classList.remove('opacity-0', 'pointer-events-none');
            lightboxOverlay.classList.add('opacity-100', 'pointer-events-auto');

            // 核心修正點：確保圖片完全載入後再初始化，並執行 Reset & Resize 來完美校正中心點
            lightboxImg.onload = () => {
                initPanzoom();
                setTimeout(() => {
                    if (pzInstance) {
                        pzInstance.reset({ animate: false });
                        pzInstance.setStyle(panzoomWrapper, 'transformOrigin', 'center center');
                    }
                }, 50);
            };
        }

        function closeLightbox() {
            lightboxOverlay.classList.remove('opacity-100', 'pointer-events-auto');
            lightboxOverlay.classList.add('opacity-0', 'pointer-events-none');
            zoomRatioTag.style.opacity = '0';

            setTimeout(() => {
                if (pzInstance) {
                    pzInstance.reset({ animate: false });
                    pzInstance.destroy();
                    pzInstance = null;
                }
                lightboxImg.src = ''; 
            }, 300);

            startCarousel(); 
        }

        zoomInBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (pzInstance) pzInstance.zoomIn();
        });

        zoomOutBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (pzInstance) pzInstance.zoomOut();
        });

        lightboxClose.addEventListener('click', (e) => {
            e.stopPropagation();
            closeLightbox();
        });

        lightboxOverlay.addEventListener('click', (e) => {
            if (e.target === lightboxOverlay || e.target === panzoomContainer || e.target === panzoomWrapper) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
